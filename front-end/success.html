<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Succès | Proposition Envoyée</title>
    <style>
      body {
        background: #f4f7f9;
        font-family: "Segoe UI", Tahoma, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        padding: 50px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 400px;
        border-top: 6px solid #27ae60;
      }
      .checkmark {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: block;
        stroke-width: 2;
        stroke: #fff;
        stroke-miterlimit: 10;
        margin: 0 auto 20px;
        box-shadow: inset 0px 0px 0px #27ae60;
        animation: fill 0.4s ease-in-out 0.4s forwards,
          scale 0.3s ease-in-out 0.9s both;
        background: #27ae60;
      }
      h2 {
        color: #2c3e50;
        margin-bottom: 10px;
      }
      p {
        color: #7f8c8d;
        line-height: 1.6;
        margin-bottom: 30px;
      }
      .btn {
        display: inline-block;
        padding: 12px 25px;
        background: #2c3e50;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
      }
      .btn:hover {
        background: #34495e;
        transform: translateY(-2px);
      }

      @keyframes fill {
        100% {
          box-shadow: inset 0px 0px 0px 30px #27ae60;
        }
      }
      @keyframes scale {
        0%,
        100% {
          transform: none;
        }
        50% {
          transform: scale3d(1.1, 1.1, 1);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="checkmark">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 52 52"
          style="padding: 15px"
        >
          <path
            fill="none"
            d="M14.1 27.2l7.1 7.2 16.7-16.8"
            stroke="#fff"
            stroke-width="5"
          />
        </svg>
      </div>
      <h2>Soumission Réussie !</h2>
      <p>
        Votre proposition de projet a été enregistrée avec succès dans la base
        de données.
      </p>
      <a href="index.html" class="btn">Retour au formulaire</a>
    </div>
  </body>
</html>
