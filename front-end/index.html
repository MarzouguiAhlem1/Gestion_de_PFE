<<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portail PFE | Soumission</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Soumission PFE</h2>
      <p class="subtitle">
        Remplissez le formulaire pour soumettre votre proposition de projet.
      </p>

      <form action="../backend/submit.php" method="POST">
        <div class="form-row">
          <div class="form-group">
            <label>Nom</label>
            <input
              type="text"
              name="nom"
              placeholder="Ex: Marzougui"
              required
            />
          </div>
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="prenom" placeholder="Ex: Ahlem" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email Académique</label>
          <input
            type="email"
            name="email"
            placeholder="etudiant@institution.tn"
            required
          />
        </div>

        <div class="form-group">
          <label>Titre du Projet</label>
          <input
            type="text"
            name="titre_projet"
            placeholder="Ex: Gestion de Portail PFE"
            required
          />
        </div>

        <div class="form-group">
          <label>Description du Projet</label>
          <textarea
            name="description"
            rows="4"
            placeholder="Décrivez brièvement les fonctionnalités..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>Technologies Utilisées</label>
          <input
            type="text"
            name="technologies"
            placeholder="Ex: React, Node.js, MariaDB"
          />
        </div>

        <button type="submit" class="btn-submit">
          Soumettre la Proposition
        </button>
      </form>
    </div>
  </body>
</html>
