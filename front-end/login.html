<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestPFE — Connexion & Inscription</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">

  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-container">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <span>Gest<strong>PFE</strong></span>
    </div>

    <!-- Box -->
    <div class="auth-box">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">
          <i class="fas fa-sign-in-alt"></i> Connexion
        </button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">
          <i class="fas fa-user-plus"></i> Inscription
        </button>
      </div>

      <!-- Alerts -->
      <div class="alert alert-error" id="alert-error" style="display:none">
        <i class="fas fa-exclamation-circle"></i>
        <span id="alert-error-msg"></span>
      </div>
      <div class="alert alert-success" id="alert-success" style="display:none">
        <i class="fas fa-check-circle"></i>
        <span id="alert-success-msg"></span>
      </div>

      <!-- ── LOGIN FORM ────────────────────────────────── -->
      <div class="auth-form active" id="form-login">
       
        <p class="subtitle">Connectez-vous avec votre email universitaire</p>

        <div class="form-group">
          <label>Adresse email</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input class="form-control" type="email" id="login-email"
                   placeholder="prenom.nom@fst-sbz.tn">
          </div>
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <div class="input-icon" style="position:relative">
            <i class="fas fa-lock"></i>
            <input class="form-control" type="password" id="login-password"
                   placeholder="••••••••">
            <button class="pw-toggle" type="button" onclick="togglePw('login-password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn btn-primary btn-block" onclick="handleLogin()">
          <span id="login-btn-text"><i class="fas fa-arrow-right-to-bracket"></i> Se connecter</span>
          <span class="spinner" id="login-spinner"></span>
        </button>

        <div class="auth-footer">
          Pas encore de compte ?
          <a href="#" onclick="switchTab('register')">S'inscrire maintenant</a>
        </div>
      </div>

      <!-- ── REGISTER FORM ─────────────────────────────── -->
      <div class="auth-form" id="form-register">
        <h2>Créer un compte 🎓</h2>
        <p class="subtitle">Rejoignez la plateforme GestPFE</p>

        <div class="form-row">
          <div class="form-group">
            <label>Prénom *</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input class="form-control" type="text" id="reg-prenom" placeholder="Mohamed">
            </div>
          </div>
          <div class="form-group">
            <label>Nom *</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input class="form-control" type="text" id="reg-nom" placeholder="Trabelsi">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email universitaire *</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input class="form-control" type="email" id="reg-email" placeholder="prenom.nom@fst-sbz.tn">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Numéro CIN *</label>
            <div class="input-icon">
              <i class="fas fa-id-card"></i>
              <input class="form-control" type="text" id="reg-cin" placeholder="12345678" maxlength="8">
            </div>
          </div>
          <div class="form-group">
            <label>Filière *</label>
            <div class="input-icon">
              <i class="fas fa-book"></i>
              <select class="form-control" id="reg-filiere">
                <option value="">Choisir...</option>
                <option value="sc_informatique">Licence Informatique</option>
                <option value="tic">Licence TIC</option>
                <option value="agro_alimentaire">Agro-alimentaire</option>
                
              </select>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Mot de passe *</label>
          <div class="input-icon" style="position:relative">
            <i class="fas fa-lock"></i>
            <input class="form-control" type="password" id="reg-password"
                   placeholder="Minimum 8 caractères">
            <button class="pw-toggle" type="button" onclick="togglePw('reg-password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="pw-strength">
            <div class="pw-bar"><div class="pw-bar-fill" id="pw-bar-fill"></div></div>
            <span class="pw-strength-label" id="pw-strength-label"></span>
          </div>
        </div>

        <div class="form-group">
          <label>Confirmer le mot de passe *</label>
          <div class="input-icon" style="position:relative">
            <i class="fas fa-lock"></i>
            <input class="form-control" type="password" id="reg-confirm" placeholder="••••••••">
            <button class="pw-toggle" type="button" onclick="togglePw('reg-confirm', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="checkbox-group">
            <input type="checkbox" id="agree-terms">
            J'accepte les <a href="#">conditions d'utilisation</a> de la plateforme
          </label>
        </div>

        <button class="btn btn-primary btn-block" onclick="handleRegister()">
          <span id="reg-btn-text"><i class="fas fa-rocket"></i> Créer mon compte</span>
          <span class="spinner" id="reg-spinner"></span>
        </button>

        <div class="auth-footer">
          Déjà inscrit ?
          <a href="#" onclick="switchTab('login')">Se connecter</a>
        </div>
      </div>

    </div><!-- /.auth-box -->

    <p style="text-align:center;font-size:0.78rem;color:var(--text-muted);margin-top:16px;">
      © 2025-2026 GestPFE — FST Sidi Bouzid
    </p>

  </div><!-- /.auth-container -->

  <!-- Toast -->
  <div id="toast"><i class="fas fa-bell"></i><span id="toast-msg"></span></div>

  <script src="app.js"></script>
</body>
</html>
